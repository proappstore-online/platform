name: Deploy Admin Worker

# Auto-deploys the proappstore-admin Worker on every push to main that touches
# the admin package. wrangler deploy is idempotent. Admin owns no D1, so there
# are no migrations to apply (it talks to the GitHub + Cloudflare APIs).
#
# Worker secrets: Doppler (project `pas`) is the source of truth. Doppler can't
# push into a Worker's RUNTIME secrets, so we sync them here via `wrangler secret
# put` from the Doppler→GitHub-org-synced values on each deploy. GITHUB_TOKEN (the
# Worker's runtime name) is sourced from Doppler's PAS_ADMIN_GH_TOKEN — GitHub
# reserves `GITHUB_*` secret names so the Doppler/org key uses a GH-suffix. It
# must carry the `workflow` permission so agent-deploy can commit
# .github/workflows/deploy.yml into app repos. CF_API_TOKEN, SESSION_SIGNING_KEY,
# and INTERNAL_TOKEN are still set manually (same pattern can migrate them later).
# PAS_ADMIN_GH_TOKEN is live in Doppler as of 2026-06-03 (fine-grained PAT with
# Workflows: write) — this deploy syncs it into the Worker's GITHUB_TOKEN.

on:
  push:
    branches: [main]
    paths:
      - 'packages/admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Tests
        run: pnpm test

      - name: Deploy Worker
        working-directory: packages/admin
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Source the Worker's runtime GITHUB_TOKEN from Doppler (PAS_ADMIN_GH_TOKEN,
      # synced to org secrets). Needs the `workflow` permission. No-op if the key
      # isn't set yet, so this never breaks a deploy during migration.
      - name: Sync GITHUB_TOKEN from Doppler
        working-directory: packages/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAS_ADMIN_GH_TOKEN: ${{ secrets.PAS_ADMIN_GH_TOKEN }}
        run: |
          if [ -n "$PAS_ADMIN_GH_TOKEN" ]; then
            printf '%s' "$PAS_ADMIN_GH_TOKEN" | pnpm exec wrangler secret put GITHUB_TOKEN
            echo "✓ Worker GITHUB_TOKEN synced from Doppler (PAS_ADMIN_GH_TOKEN)"
          else
            echo "⚠ PAS_ADMIN_GH_TOKEN not set in Doppler/org yet — leaving the existing Worker GITHUB_TOKEN unchanged"
          fi

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" https://admin.proappstore.online/health)
            if [ "$CODE" = "200" ]; then
              echo "✓ /health returned 200"
              exit 0
            fi
            echo "attempt $i: $CODE, retrying..."
            sleep 5
          done
          echo "✗ /health never returned 200 after deploy"
          exit 1
