name: Deploy Admin Worker

# Auto-deploys the proappstore-admin Worker on every push to main that touches
# the admin package. wrangler deploy is idempotent. Admin owns no D1, so there
# are no migrations to apply (it talks to the GitHub + Cloudflare APIs).
#
# Worker secrets (GITHUB_TOKEN, CF_API_TOKEN, SESSION_SIGNING_KEY, INTERNAL_TOKEN)
# persist across deploys and are managed via `wrangler secret put`, not CI.

on:
  push:
    branches: [main]
    paths:
      - 'packages/admin/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Tests
        run: pnpm test

      - name: Deploy Worker
        working-directory: packages/admin
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" https://admin.proappstore.online/health)
            if [ "$CODE" = "200" ]; then
              echo "✓ /health returned 200"
              exit 0
            fi
            echo "attempt $i: $CODE, retrying..."
            sleep 5
          done
          echo "✗ /health never returned 200 after deploy"
          exit 1
