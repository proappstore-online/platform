name: Reconcile app deploy secrets

# WHY: proappstore-online is on the GitHub FREE plan and app repos are PRIVATE.
# Private repos CANNOT inherit org-level Actions secrets on Free — so each app
# repo needs the R2 deploy creds (R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY /
# R2_ACCOUNT_ID) as REPO-level secrets, or it dies at "Upload to R2".
#
# This job runs in the PUBLIC platform repo — which CAN read org secrets — reads
# the R2 creds from the org-level "hub" secret, and fans them out as repo secrets
# to every private app repo (those with an injected deploy.yml). Also catches drift
# for freshly-created apps and handles rotation: update the hub org secret (from
# SOPS: sops -d --extract '["pas"]["R2_ACCESS_KEY_ID"]' secrets.enc.yaml | gh secret
# set … --org proappstore-online), re-run this, every app repo gets the new value.
# Ref: ~/dev/secrets/inventory.yaml (R2 section) + README.md "GitHub org secret scope".

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to reconcile (name only, e.g. aipa-console). Blank = all app repos."
        required: false
        default: ""
  schedule:
    - cron: "17 * * * *" # hourly — backstop that catches newly-created apps

permissions:
  contents: read

concurrency:
  group: reconcile-app-secrets
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      # GH_ADMIN_TOKEN — org secret; a PAT with admin (Actions secrets: write) on
      # the org's repos. Needed because the default GITHUB_TOKEN is scoped to THIS
      # repo only and cannot write secrets to other repos.
      GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      ONLY_REPO: ${{ github.event.inputs.repo }}
    steps:
      - name: Fan R2 deploy creds out to private app repos
        run: |
          set -euo pipefail

          if [ -z "${R2_ACCESS_KEY_ID}" ] || [ -z "${R2_SECRET_ACCESS_KEY}" ] || [ -z "${R2_ACCOUNT_ID}" ]; then
            echo "::error::Org R2_* 'hub' secrets are empty. Set them on the org from SOPS (~/dev/secrets), then re-run:"
            echo "::error::  sops -d --extract '[\"pas\"][\"R2_ACCESS_KEY_ID\"]' secrets.enc.yaml | gh secret set R2_ACCESS_KEY_ID --org proappstore-online --visibility public"
            echo "::error::  (repeat for R2_SECRET_ACCESS_KEY and R2_ACCOUNT_ID)"
            exit 1
          fi

          if [ -n "${ONLY_REPO}" ]; then
            repos="${ONLY_REPO}"
          else
            repos=$(gh repo list proappstore-online --limit 300 --no-archived \
              --json name,visibility,isFork \
              --jq '.[] | select(.visibility=="PRIVATE" and .isFork==false) | .name')
          fi

          count=0
          for r in $repos; do
            full="proappstore-online/$r"
            # Only app repos get R2 creds — identified by the injected deploy workflow.
            if ! gh api "repos/$full/contents/.github/workflows/deploy.yml" --silent >/dev/null 2>&1; then
              echo "skip $r (no deploy.yml — not an app repo)"
              continue
            fi
            gh secret set R2_ACCESS_KEY_ID     -R "$full" --body "$R2_ACCESS_KEY_ID"
            gh secret set R2_SECRET_ACCESS_KEY -R "$full" --body "$R2_SECRET_ACCESS_KEY"
            gh secret set R2_ACCOUNT_ID        -R "$full" --body "$R2_ACCOUNT_ID"
            echo "reconciled $r"
            count=$((count + 1))
          done
          echo "Reconciled R2 deploy secrets on ${count} app repo(s)."
