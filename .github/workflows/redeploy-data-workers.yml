name: Redeploy data workers

# One-off / on-demand fleet migration: re-provision every app's data-worker so
# it picks up the latest committed bundle (packages/data-worker/dist/worker.js)
# and current bindings (incl. INTERNAL_TOKEN). Idempotent — provisionData skips
# existing D1 and upserts the app row, so re-running is safe.
#
# Run from the Actions tab (workflow_dispatch). Optionally scope to one app.

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: 'Single app id to redeploy (blank = whole fleet)'
        required: false
        default: ''

concurrency:
  group: redeploy-data-workers
  cancel-in-progress: false

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile

      - name: Resolve app list
        id: apps
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ONE_APP: ${{ github.event.inputs.app_id }}
        working-directory: packages/backend
        run: |
          if [ -n "$ONE_APP" ]; then
            # creator_id looked up so the upsert preserves it
            ROW=$(pnpm exec wrangler d1 execute pas --remote --json \
              --command "SELECT id, creator_id FROM apps WHERE id='$ONE_APP'")
          else
            ROW=$(pnpm exec wrangler d1 execute pas --remote --json \
              --command "SELECT id, creator_id FROM apps ORDER BY id")
          fi
          echo "$ROW" | jq -c '[.[0].results[] | {id, creator_id}]' > /tmp/apps.json
          echo "count=$(jq 'length' /tmp/apps.json)" >> "$GITHUB_OUTPUT"

      - name: Redeploy each data-worker via /v1/provision-data
        env:
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: |
          test -n "$INTERNAL_TOKEN" || { echo "::error::INTERNAL_TOKEN not set"; exit 1; }
          echo "Redeploying ${{ steps.apps.outputs.count }} data-worker(s)…"
          ok=0; fail=0
          while read -r row; do
            APP=$(echo "$row" | jq -r '.id')
            CREATOR=$(echo "$row" | jq -r '.creator_id')
            [ -z "$APP" ] && continue
            CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
              "https://api.proappstore.online/v1/provision-data" \
              -H "X-Internal-Token: $INTERNAL_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"appId\":\"$APP\",\"creatorId\":\"$CREATOR\"}")
            SUCCESS=$(jq -r '.success // false' /tmp/resp.json 2>/dev/null)
            if [ "$CODE" = "200" ] && [ "$SUCCESS" = "true" ]; then
              echo "  ✓ $APP"; ok=$((ok+1))
            else
              echo "  ✗ $APP (HTTP $CODE): $(jq -c '.steps // .error // .' /tmp/resp.json 2>/dev/null)"; fail=$((fail+1))
            fi
          done < <(jq -c '.[]' /tmp/apps.json)
          echo "Done — $ok ok, $fail failed."
          [ "$fail" = "0" ]
