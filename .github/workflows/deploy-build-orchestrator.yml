name: Deploy Build Orchestrator Worker

# Deploys proappstore-build-orchestrator (build.proappstore.online) — the GitHub
# App webhook receiver that queues app builds (ADR-006). Worker runtime secrets
# are set from Doppler-backed GitHub org secrets on each deploy.
#
# Secrets live in Doppler (pas/prd) and auto-sync to GitHub org secrets. NOTE:
# GitHub forbids secret names starting with GITHUB_, so the App secrets are named
# GH_BUILDER_* here and mapped to the worker's GITHUB_* env vars below.
#
# Starts as workflow_dispatch ONLY. Once the GH_BUILDER_* + R2_* secrets exist in
# Doppler and the queue/domain are created, flip on the push trigger.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/build-orchestrator/**'
      - '.github/workflows/deploy-build-orchestrator.yml'

permissions:
  contents: read

concurrency:
  group: deploy-build-orchestrator
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r --filter './packages/*' build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Tests
        run: pnpm test

      - name: Apply D1 migrations (backend owns the dir; creates the builds table)
        working-directory: packages/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply pas --remote

      - name: Ensure the build queue exists (idempotent)
        working-directory: packages/build-orchestrator
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler queues create pas-builds || true

      - name: Deploy Worker
        working-directory: packages/build-orchestrator
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Set runtime secrets (Doppler-backed GitHub secrets → worker)
        working-directory: packages/build-orchestrator
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # GH_BUILDER_* (no GITHUB_ prefix — GitHub Actions reserves it).
          GH_BUILDER_WEBHOOK_SECRET: ${{ secrets.GH_BUILDER_WEBHOOK_SECRET }}
          GH_BUILDER_APP_ID: ${{ secrets.GH_BUILDER_APP_ID }}
          GH_BUILDER_PRIVATE_KEY: ${{ secrets.GH_BUILDER_PRIVATE_KEY }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          test -n "$GH_BUILDER_WEBHOOK_SECRET"
          test -n "$GH_BUILDER_APP_ID"
          test -n "$GH_BUILDER_PRIVATE_KEY"
          test -n "$INTERNAL_TOKEN"
          # Map GH_BUILDER_* → the worker's GITHUB_* env vars (what the code reads).
          printf '%s' "$GH_BUILDER_WEBHOOK_SECRET" | pnpm exec wrangler secret put GITHUB_WEBHOOK_SECRET
          printf '%s' "$GH_BUILDER_APP_ID"         | pnpm exec wrangler secret put GITHUB_APP_ID
          printf '%s' "$GH_BUILDER_PRIVATE_KEY"    | pnpm exec wrangler secret put GITHUB_APP_PRIVATE_KEY
          printf '%s' "$INTERNAL_TOKEN"            | pnpm exec wrangler secret put INTERNAL_TOKEN
          printf '%s' "$R2_ACCOUNT_ID"             | pnpm exec wrangler secret put R2_ACCOUNT_ID
          printf '%s' "$R2_ACCESS_KEY_ID"          | pnpm exec wrangler secret put R2_ACCESS_KEY_ID
          printf '%s' "$R2_SECRET_ACCESS_KEY"      | pnpm exec wrangler secret put R2_SECRET_ACCESS_KEY

      - name: Smoke test the webhook endpoint
        # NB: /health on build.proappstore.online is answered by the host worker
        # (it handles /health for any hostname before dispatch). The orchestrator
        # is reached via the host's `build` service-binding dispatch, so we probe
        # the real endpoint: POST /webhook with no signature must return 401
        # (request reached the orchestrator and was correctly rejected). Requires
        # proappstore-host to be deployed with the BUILD binding first.
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" -X POST https://build.proappstore.online/webhook -d '{}')
            if [ "$CODE" = "401" ]; then echo "✓ /webhook reachable, rejects unsigned (401)"; exit 0; fi
            echo "attempt $i: $CODE (expect 401; 404 = host not yet redeployed with BUILD binding)"; sleep 5
          done
          echo "✗ /webhook never returned 401"; exit 1
