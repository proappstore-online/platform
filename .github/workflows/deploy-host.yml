name: Deploy Host Worker

# proappstore-host serves published apps from R2 via subdomain routing. Its
# wildcard `*.proappstore.online/*` route preempts sibling Worker custom domains,
# so reserved subdomains must be dispatched through service bindings. Host
# routing changes deploy automatically because stale host code breaks live
# subdomains even when sibling Workers deploy successfully.

on:
  push:
    branches: [main]
    paths:
      - 'packages/host/**'
      - '.github/workflows/deploy-host.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-host
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r --filter './packages/*' build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Tests
        run: pnpm test
      - name: Deploy Worker
        working-directory: packages/host
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
