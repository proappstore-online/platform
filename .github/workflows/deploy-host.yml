name: Deploy Host Worker

# proappstore-host serves published apps from R2 via subdomain routing. Its
# wildcard `*.proappstore.online/*` route preempts sibling Worker custom domains,
# so reserved subdomains must be dispatched through service bindings. Host
# routing changes deploy automatically because stale host code breaks live
# subdomains even when sibling Workers deploy successfully.

on:
  push:
    branches: [main]
    paths:
      - 'packages/host/**'
      - '.github/workflows/deploy-host.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-host
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r --filter './packages/*' build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Tests
        run: pnpm test
      - name: Deploy Worker
        working-directory: packages/host
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Reconcile wildcard custom-domain routes
        working-directory: packages/host
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          rows_json=$(pnpm exec wrangler d1 execute pas --remote --json --command \
            "SELECT domain, cf_payload FROM app_custom_domains WHERE kind = 'wildcard' AND status = 'active' AND cf_payload IS NOT NULL")

          echo "$rows_json" | jq -c '.[0].results[]?' | while read -r row; do
            domain=$(jq -r '.domain' <<<"$row")
            zone_id=$(jq -r '.cf_payload | fromjson | .zoneId // empty' <<<"$row")
            pattern=$(jq -r --arg domain "$domain" '.cf_payload | fromjson | .pattern // "*.\($domain)/*"' <<<"$row")

            if [ -z "$zone_id" ] || [ -z "$pattern" ]; then
              echo "::warning::Skipping wildcard route for $domain; cf_payload is missing zoneId or pattern"
              continue
            fi

            encoded_pattern=$(node -e 'process.stdout.write(encodeURIComponent(process.argv[1]))' "$pattern")
            routes_url="https://api.cloudflare.com/client/v4/zones/$zone_id/workers/routes"
            route_json=$(curl -fsS -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$routes_url?pattern=$encoded_pattern")
            foreign_script=$(jq -r --arg pattern "$pattern" \
              '.result[]? | select(.pattern == $pattern and .script != null and .script != "proappstore-host") | .script' <<<"$route_json" | head -n 1)

            if [ -n "$foreign_script" ]; then
              echo "::error::Workers route $pattern already points at $foreign_script"
              exit 1
            fi

            route_id=$(jq -r --arg pattern "$pattern" \
              '.result[]? | select(.pattern == $pattern and (.script == null or .script == "proappstore-host")) | .id' <<<"$route_json" | head -n 1)

            if [ -z "$route_id" ]; then
              route_id=$(curl -fsS -X POST \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                -H "Content-Type: application/json" \
                --data "$(jq -cn --arg pattern "$pattern" --arg script "proappstore-host" '{pattern: $pattern, script: $script}')" \
                "$routes_url" | jq -r '.result.id')
              echo "Created wildcard route $pattern -> proappstore-host"
            else
              echo "Verified wildcard route $pattern -> proappstore-host"
            fi

            payload=$(jq -cn --arg zoneId "$zone_id" --arg routeId "$route_id" --arg pattern "$pattern" \
              '{kind: "wildcard-route", zoneId: $zoneId, routeId: $routeId, dnsRecordId: null, pattern: $pattern}')
            sql=$(node -e '
              const [payload, domain] = process.argv.slice(1);
              const q = String.fromCharCode(39);
              const esc = (s) => s.split(q).join(q + q);
              process.stdout.write("UPDATE app_custom_domains SET cf_payload = " + q + esc(payload) + q + " WHERE kind = " + q + "wildcard" + q + " AND domain = " + q + esc(domain) + q);
            ' "$payload" "$domain")
            pnpm exec wrangler d1 execute pas --remote --command "$sql"
          done
