name: Publish Platform Docs

# Public platform documentation is published with Zensical to the shared KB host.
# MkDocs is only the generated config format consumed by Zensical; do not publish
# these docs with a separate MkDocs or VitePress deployment.

on:
  push:
    branches: [main]
    paths: ['docs/**', '.github/workflows/publish-docs.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-platform-docs
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build Zensical site
        run: |
          python -m pip install --quiet zensical
          rm -rf zensical-src site public
          mkdir -p zensical-src/assets zensical-src/stylesheets
          cp -r docs/. zensical-src/
          rm -rf zensical-src/.vitepress
          rm -f zensical-src/SERVICES.md zensical-src/adr/000-template.md
          cat > zensical-src/assets/logo.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs><rect width="512" height="512" rx="96" fill="url(#bg)"/><text x="256" y="346" font-family="Manrope, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="300" fill="white" text-anchor="middle">P</text></svg>
          SVG
          cp zensical-src/assets/logo.svg zensical-src/assets/favicon.svg
          cat > zensical-src/stylesheets/extra.css <<'CSS'
          :root > * {
            --md-primary-fg-color: #7c3aed;
            --md-primary-fg-color--light: #a78bfa;
            --md-primary-fg-color--dark: #4c1d95;
            --md-accent-fg-color: #7c3aed;
          }
          [data-md-color-scheme="slate"] {
            --md-primary-fg-color: #a78bfa;
            --md-primary-fg-color--light: #c4b5fd;
            --md-primary-fg-color--dark: #7c3aed;
            --md-accent-fg-color: #a78bfa;
          }
          .md-header__title { font-weight: 700; letter-spacing: -0.01em; }
          CSS
          cat > mkdocs.yml <<'YAML'
          site_name: ProAppStore Platform Docs
          site_url: https://kb.proappstore.online/platform/
          docs_dir: zensical-src
          copyright: Built on ProAppStore · proappstore.online
          theme:
            name: material
            logo: assets/logo.svg
            favicon: assets/favicon.svg
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: custom
                accent: custom
                toggle:
                  icon: lucide/sun
                  name: Switch to dark mode
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: custom
                accent: custom
                toggle:
                  icon: lucide/moon
                  name: Switch to light mode
          extra_css:
            - stylesheets/extra.css
          nav:
            - Home: index.md
            - Getting Started: getting-started.md
            - SDK: sdk-overview.md
            - UI Components: ui.md
            - Recipes: recipes.md
            - CLI: cli-overview.md
            - Publishing: publishing-flow.md
            - MCP App Tools: mcp-app-tools.md
            - Agent Customization: agent-customization.md
            - Agent Teams Runtime: agent-teams-runtime-and-billing.md
            - Architecture: architecture.md
            - ADRs:
                - Cloudflare Workers Only: adr/001-cloudflare-workers-only.md
                - Tailored vs Ready: adr/002-tailored-vs-ready-split.md
                - One Control Plane: adr/003-one-control-plane.md
                - Stripe via PAS: adr/004-stripe-via-pas.md
                - D1 per Fork: adr/005-d1-per-fork.md
          YAML
          python -m zensical build
      - name: Publish to kb-host
        env:
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
        run: |
          if [ -z "$INTERNAL_TOKEN" ]; then echo "INTERNAL_TOKEN missing — cannot publish docs"; exit 1; fi
          out=site
          [ -d "$out" ] || out=public
          cd "$out"
          find . -type f | while read -r f; do
            curl -fsS -X PUT "https://kb.proappstore.online/_ingest/platform/${f#./}" -H "x-internal-token: $INTERNAL_TOKEN" --data-binary "@$f" >/dev/null
          done
          echo "Platform docs published → https://kb.proappstore.online/platform/"
