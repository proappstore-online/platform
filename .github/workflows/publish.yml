name: Publish to npm

# Triggers on any push to main that touches the publishable packages.
# Auto-bumps patch version when changes exist but no manual bump was made.
# Manual bumps (minor/major) are respected — auto-bump only kicks in
# when local version == npm version.
#
# Auth: OIDC trusted publishing — no stored NPM_TOKEN needed.
# Each @proappstore/* package is linked to this repo on npmjs.com.

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/sdk/**'
      - 'packages/compliance/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch: # manual trigger from the Actions UI

permissions:
  contents: write # push version bumps back to main
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [cli, sdk, compliance]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter './packages/*' build

      - name: Decide whether to publish
        id: decide
        working-directory: packages/${{ matrix.package }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          LOCAL_VER=$(node -p "require('./package.json').version")
          NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          echo "$PKG_NAME — local=$LOCAL_VER  npm=$NPM_VER"
          if [ "$LOCAL_VER" != "$NPM_VER" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Manual bump ($NPM_VER → $LOCAL_VER) — will publish."
          else
            # Auto-bump patch: 1.16.0 → 1.16.1
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LOCAL_VER"
            NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Auto-bumping $LOCAL_VER → $NEW_VER"
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$NEW_VER';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish via OIDC trusted publishing
        if: steps.decide.outputs.publish == 'true'
        working-directory: packages/${{ matrix.package }}
        # `pnpm publish` rewrites `workspace:*` deps to real versions
        # at pack time. `npm publish` would leave them as the literal
        # `workspace:*` and consumers' installs would fail.
        run: pnpm publish --access public --provenance --no-git-checks

  commit-bumps:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump versions that were auto-published
        id: bump
        run: |
          BUMPED=""
          for PKG in cli sdk compliance; do
            PKG_NAME=$(node -p "require('./packages/$PKG/package.json').name")
            LOCAL_VER=$(node -p "require('./packages/$PKG/package.json').version")
            NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
            if [ "$LOCAL_VER" != "$NPM_VER" ]; then
              echo "$PKG_NAME: $LOCAL_VER → $NPM_VER (published)"
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('./packages/$PKG/package.json', 'utf8'));
                pkg.version = '$NPM_VER';
                fs.writeFileSync('./packages/$PKG/package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              BUMPED="$BUMPED $PKG_NAME@$NPM_VER"
            fi
          done
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.bump.outputs.bumped != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: auto-bump published versions [skip ci]"
          git push
