name: Publish to npm

# Triggers on any push to main that touches the publishable packages.
# Each package self-checks: if its package.json version is unchanged
# vs what's already on npm, the publish is a no-op.
#
# Auth: OIDC trusted publishing — no stored NPM_TOKEN needed.
# Each @proappstore/* package is linked to this repo on npmjs.com.

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/sdk/**'
      - 'packages/compliance/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch: # manual trigger from the Actions UI

permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [cli, sdk, compliance]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter './packages/*' build

      - name: Decide whether to publish
        id: decide
        working-directory: packages/${{ matrix.package }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          LOCAL_VER=$(node -p "require('./package.json').version")
          NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          echo "$PKG_NAME — local=$LOCAL_VER  npm=$NPM_VER"
          if [ "$LOCAL_VER" = "$NPM_VER" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged — skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped ($NPM_VER → $LOCAL_VER) — will publish."
          fi

      - name: Publish via OIDC trusted publishing
        if: steps.decide.outputs.publish == 'true'
        working-directory: packages/${{ matrix.package }}
        # `pnpm publish` rewrites `workspace:*` deps to real versions
        # at pack time. `npm publish` would leave them as the literal
        # `workspace:*` and consumers' installs would fail.
        run: pnpm publish --access public --provenance --no-git-checks
