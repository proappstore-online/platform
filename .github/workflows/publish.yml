name: Publish to npm

# Triggers on any push to main that touches the publishable packages.
# Auto-bumps patch version when changes exist but no manual bump was made.
# Manual bumps (minor/major) are respected — auto-bump only kicks in
# when local version == npm version and the package has changes in this push.
#
# Auth: OIDC trusted publishing — no stored NPM_TOKEN needed.
# Each @proappstore/* package is linked to this repo on npmjs.com.

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/sdk/**'
      - 'packages/compliance/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch: # manual trigger — publishes all packages

permissions:
  contents: write # push version bumps back to main
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history to diff which packages changed in this push.
          # fetch-depth 2 covers single-commit pushes; for multi-commit
          # pushes github.event.before is used directly (already in remote).
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --filter './packages/*' build

      - name: Publish packages
        id: publish
        run: |
          BUMPED=""
          FAILED=""
          BEFORE="${{ github.event.before }}"

          for PKG in cli sdk compliance; do
            PKG_NAME=$(node -p "require('./packages/$PKG/package.json').name")
            LOCAL_VER=$(node -p "require('./packages/$PKG/package.json').version")
            NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")

            # Compare versions (is local ahead of npm?)
            IS_AHEAD=$(node -e "
              const [a,b] = ['$LOCAL_VER','$NPM_VER'].map(v => v.split('.').map(Number));
              const ahead = a[0]>b[0] || (a[0]===b[0] && (a[1]>b[1] || (a[1]===b[1] && a[2]>b[2])));
              console.log(ahead ? 'true' : 'false');
            ")

            if [ "$LOCAL_VER" != "$NPM_VER" ] && [ "$IS_AHEAD" = "true" ]; then
              # Manual bump — publish as-is
              echo "::group::$PKG_NAME: manual bump $NPM_VER → $LOCAL_VER"
              if (cd packages/$PKG && pnpm publish --access public --provenance --no-git-checks); then
                echo "Published $PKG_NAME@$LOCAL_VER"
              else
                FAILED="$FAILED $PKG_NAME"
              fi
              echo "::endgroup::"

            elif [ "$LOCAL_VER" != "$NPM_VER" ] && [ "$IS_AHEAD" = "false" ]; then
              # Local is behind npm (missed bump commit) — heal by syncing local to npm
              echo "$PKG_NAME: healing $LOCAL_VER → $NPM_VER (syncing to npm)"
              node -e "
                const fs = require('fs');
                const pkg = JSON.parse(fs.readFileSync('./packages/$PKG/package.json', 'utf8'));
                pkg.version = '$NPM_VER';
                fs.writeFileSync('./packages/$PKG/package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              BUMPED="$BUMPED $PKG_NAME@$NPM_VER"

            else
              # Version matches npm — auto-bump only if this package has changes
              HAS_CHANGES=true
              if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
                if git diff --quiet "$BEFORE" HEAD -- "packages/$PKG/"; then
                  HAS_CHANGES=false
                fi
              fi

              if [ "$HAS_CHANGES" = "true" ]; then
                IFS='.' read -r MAJOR MINOR PATCH <<< "$LOCAL_VER"
                NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
                echo "::group::$PKG_NAME: auto-bump $LOCAL_VER → $NEW_VER"
                node -e "
                  const fs = require('fs');
                  const pkg = JSON.parse(fs.readFileSync('./packages/$PKG/package.json', 'utf8'));
                  pkg.version = '$NEW_VER';
                  fs.writeFileSync('./packages/$PKG/package.json', JSON.stringify(pkg, null, 2) + '\n');
                "
                if (cd packages/$PKG && pnpm publish --access public --provenance --no-git-checks); then
                  echo "Published $PKG_NAME@$NEW_VER"
                  BUMPED="$BUMPED $PKG_NAME@$NEW_VER"
                else
                  FAILED="$FAILED $PKG_NAME"
                fi
                echo "::endgroup::"
              else
                echo "$PKG_NAME: no changes, skipping"
              fi
            fi
          done

          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

      - name: Commit version bumps
        if: steps.publish.outputs.bumped != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: auto-bump published versions [skip ci]"
          # --autostash: the build step leaves dist/lockfile changes unstaged;
          # without it `pull --rebase` aborts ("you have unstaged changes").
          git pull --rebase --autostash origin main
          git push

      - name: Report failures
        if: steps.publish.outputs.failed != ''
        run: |
          echo "::error::Failed to publish:${{ steps.publish.outputs.failed }}"
          exit 1
