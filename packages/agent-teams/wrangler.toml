name = "proappstore-agent-teams"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "agents.proappstore.online/*"
zone_name = "proappstore.online"

[vars]
PAS_API_BASE = "https://api.proappstore.online"
# SESSION_SIGNING_KEY set as a secret:
#   wrangler secret put SESSION_SIGNING_KEY
#
# AI Gateway routing — active. Agent provider calls go through the authenticated
# Cloudflare AI Gateway "pas-agent-teams" (caching, fallback, token/cost
# observability). BYO keys + Anthropic prompt-caching pass through unchanged.
# The auth token is the AI_GATEWAY_TOKEN secret (cf-aig-authorization).
AI_GATEWAY_ACCOUNT_ID = "c1089bfcc43c1c6c2aa89e584e86f0bc"
AI_GATEWAY_ID = "pas-agent-teams"

# Project Durable Object — one per PAS Agent Teams project.
# Holds: backlog tickets, transitions, message log, role configs, cost ledger.
# WebSocket hibernation for streaming.
[[durable_objects.bindings]]
name = "PROJECT"
class_name = "ProjectDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProjectDO"]

# R2 for offloaded message bodies, ToolResult payloads, browse screenshots,
# and (deferred) checkpoint blobs.
[[r2_buckets]]
binding = "AGENT_STORAGE"
bucket_name = "pas-agent-teams"

# Shared PAS D1 — used ONLY for the agent_projects index (list a user's
# projects). Per-project state lives in the Durable Object, not here. Migrations
# are owned/applied by the backend Worker (deploy-backend.yml), not this one.
[[d1_databases]]
binding = "DB"
database_name = "pas"
database_id = "585bbda3-0016-42ad-a53d-c089f1864fcb"

# Service binding to PAS backend — for BYO key vault read + publish trigger.
[[services]]
binding = "PAS_BACKEND"
service = "proappstore-api"

# INTERNAL_TOKEN is set as a secret (not committed):
#   wrangler secret put INTERNAL_TOKEN
# Must match the same secret on the proappstore-api AND proappstore-admin Workers.
# Authenticates GET /v1/keys/resolve/:provider (BYO key vault read) and
# POST /api/agent-deploy (repo create + file push) over the service bindings.

# Service binding to the PAS admin Worker — the sanctioned repo creator. The
# agent deploy flow (scaffold_app/provision_app) pushes the authored file bundle
# here to create the repo + push code + register the app.
[[services]]
binding = "ADMIN"
service = "proappstore-admin"
