name = "proappstore-host"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# CRITICAL — wildcard route preemption:
# *.proappstore.online/* preempts every sibling Worker custom_domain on this
# zone. This Worker MUST dispatch reserved subdomains via service bindings.
# See RESERVED_SUBDOMAINS in host.ts and dispatch branches in index.ts.

[[routes]]
pattern = "*.proappstore.online/*"
zone_name = "proappstore.online"

# Apex stays on the storefront's Pages project; this Worker handles subdomains only.

[[r2_buckets]]
binding = "APPS"
bucket_name = "pas-apps"

[[d1_databases]]
binding = "DB"
database_name = "pas"
database_id = "585bbda3-0016-42ad-a53d-c089f1864fcb"
migrations_dir = "migrations"

# Service bindings — zero-hop dispatch to sibling Workers on this zone.
# Every Worker with a custom_domain on proappstore.online MUST be listed here.
[[services]]
binding = "API"
service = "proappstore-api"

[[services]]
binding = "ADMIN"
service = "proappstore-admin"

[[services]]
binding = "AGENTS"
service = "proappstore-agent-teams"

[[services]]
binding = "MCP"
service = "proappstore-mcp"

[[services]]
binding = "KB"
service = "proappstore-kb-host"

[[services]]
binding = "BUILD"
service = "proappstore-build-orchestrator"

# Secrets (set via `wrangler secret put`):
# (none — host is read-only, all secrets live on the Workers it dispatches to)
