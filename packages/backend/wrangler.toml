name = "proappstore-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
# Public base URL of this API — used to build OAuth callback URLs (routes/auth.ts).
APP_BASE = "https://api.proappstore.online"
# PAS GitHub OAuth App client id (public — sent in the authorize URL). The secret
# is a Worker secret (GITHUB_CLIENT_SECRET, from Doppler OAUTH_CLIENT_SECRET).
GITHUB_CLIENT_ID = "Ov23ctEs8trbfizdBGfQ"
# DEPRECATED: removed in the de-FAS cutover — PAS now owns auth (routes/auth.ts).
FAS_API_BASE = "https://api.freeappstore.online"
CF_ACCOUNT_ID = "c1089bfcc43c1c6c2aa89e584e86f0bc"
VAPID_PUBLIC_KEY = "BPg6E92QAOhdcif_HckOEGY6mL03VKWNQ3CS1xQX5q59fXURI1xCGwwBr4Vsv7gn3TXIGSJquJwvHGYRbMcAQc0"
# Comma-separated `gh:<id>` strings allowed to approve/reject submissions.
ADMIN_GITHUB_IDS = "gh:2824906"

[[d1_databases]]
binding = "DB"
database_name = "pas"
database_id = "585bbda3-0016-42ad-a53d-c089f1864fcb"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pas-storage"

# Workers AI binding — backs the app.ai SDK primitive.
# Free quota included with Workers Paid; pay-as-you-go beyond.
[ai]
binding = "AI"

# Workers Analytics Engine — first-party cookieless analytics for Pro apps.
# Events written by analytics-ingest.ts, queried by analytics-stats-routes.ts
# via the CF SQL API (CF_ANALYTICS_API_TOKEN secret).
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pas_analytics"

[[routes]]
pattern = "api.proappstore.online/*"
zone_name = "proappstore.online"

# PAS provisioning is fully self-contained in packages/backend/src/routes/
# provision.ts — see ADR notes there. The legacy [[services]] binding to
# freeappstore-admin (binding name ADMIN) was removed 2026-05-28 per
# PLAN-ARCH-CLEANUP Phase 4 (admin-worker-per-store principle). It had
# been dead config — no code path called env.ADMIN.fetch().

# Secrets (set via `wrangler secret put`):
#   CF_API_TOKEN                    (for provisioning D1/Pages/Workers)
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_PRO_MONTHLY_PRICE_ID     (the live Stripe price for $9/mo Pro;
#                                    until set, GET /v1/pricing returns null
#                                    and the Console hides the Upgrade button)
#   SESSION_SIGNING_KEY             (signs PAS session JWTs — routes/auth.ts)
#   VAPID_PRIVATE_KEY               (for Web Push notifications)
#   GITHUB_CLIENT_ID                (PAS GitHub OAuth app — enables browser sign-in;
#   GITHUB_CLIENT_SECRET             callback: https://api.proappstore.online/v1/auth/github/callback)
#   GOOGLE_CLIENT_ID                (shared Google OAuth client — add the same
#   GOOGLE_CLIENT_SECRET             callback as an authorized redirect URI)
#   APP_SECRET_KEK                  (32-byte base64 key for envelope encryption
#                                    of app proxy secrets; without this, proxy/
#                                    secrets/allowlist endpoints return 503)
