components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: PAS session JWT (HS256). uid/login/roles/appRoles claims.
    internalToken:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: Shared secret for service-to-service calls.
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required:
      - error
    User:
      type: object
      properties:
        uid:
          type: string
          description: e.g. gh:123 | google:123 | cred:uuid
        login:
          type: string
        avatarUrl:
          type: string
        roles:
          type: array
          items:
            type: string
            enum:
            - user
            - creator
            - admin
        appRoles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    App:
      type: object
      properties:
        id:
          type: string
        creator_id:
          type: string
        d1_database_id:
          type: string
        created_at:
          type: string
          format: date-time
    Submission:
      type: object
      properties:
        id:
          type: string
        app_id:
          type: string
        creator_id:
          type: string
        status:
          type: string
          enum:
          - pending
          - approved
          - rejected
        name:
          type: string
        category:
          type: string
        description:
          type: string
        suggested_monthly_price_cents:
          type: integer
        repo_url:
          type: string
        created_at:
          type: string
          format: date-time
    Subscription:
      type: object
      properties:
        status:
          type: string
          enum:
          - active
          - trialing
          - past_due
          - canceled
          - none
        tier:
          type: string
        current_period_end:
          type: integer
        cancel_at_period_end:
          type: boolean
    Pricing:
      type: object
      properties:
        price_cents:
          type: integer
          example: 900
        currency:
          type: string
          example: usd
        interval:
          type: string
          example: month
