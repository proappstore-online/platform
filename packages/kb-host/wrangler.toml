name = "proappstore-kb-host"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

# Dedicated subdomain (NOT a wildcard) — serves Knowledge Base sites only, so it
# does NOT preempt sibling Worker custom_domains on the zone (the
# wildcard-worker-route-preemption hazard applies only to *.proappstore.online/*).
# custom_domain auto-provisions the DNS record + managed cert on deploy IF the
# deploy token has DNS edit; otherwise add it once in the dashboard
# (Workers → proappstore-kb-host → Domains & Routes → Custom Domain).
[[routes]]
pattern = "kb.proappstore.online"
custom_domain = true

# Shared KB bucket — CI uploads each app's built Zensical site to "<app>/*" here.
# One bucket for every KB; no per-KB resource. (Created 2026-06-03.)
[[r2_buckets]]
binding = "KB_R2"
bucket_name = "pas-kb"
