name = "proappstore-build-orchestrator"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

# NO custom_domain here. proappstore-host owns the wildcard route
# *.proappstore.online/* which preempts any sibling custom_domain (see
# wildcard-route-preemption note in host/wrangler.toml). So build.proappstore.online
# is dispatched to THIS worker via a host service binding (env.BUILD) — `build` is
# in RESERVED_SUBDOMAINS + the dispatch branch in host/src/index.ts. This worker
# needs no public route of its own; the host reaches it over the binding.
# The GitHub App webhook URL stays https://build.proappstore.online/webhook.

# Secrets (wrangler secret put / Doppler pas/prd):
#   GITHUB_WEBHOOK_SECRET   — HMAC secret for X-Hub-Signature-256
#   GITHUB_APP_ID           — the PAS Builder App id
#   GITHUB_APP_PRIVATE_KEY  — the App's PKCS8 PEM private key
#   INTERNAL_TOKEN          — guards GET /builds (shared platform internal token)
#   R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY — passed to the build

# Shared pas D1 — the `builds` table (migration 0032). Migrations are applied
# from packages/backend (which owns the migrations dir) in the deploy workflow.
[[d1_databases]]
binding = "DB"
database_name = "pas"
database_id = "585bbda3-0016-42ad-a53d-c089f1864fcb"

# Build jobs: webhook handler produces; the queue() consumer drains one at a
# time and dispatches to the container.
[[queues.producers]]
queue = "pas-builds"
binding = "BUILD_QUEUE"

[[queues.consumers]]
queue = "pas-builds"
max_batch_size = 1
max_retries = 3
# Phase 3: add the Cloudflare Containers binding (BUILD_CONTAINER) here once the
# account has Containers enabled; dispatchBuild() in src/index.ts is the wiring
# point.
