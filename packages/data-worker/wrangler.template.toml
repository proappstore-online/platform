name = "pas-data-__APP_ID__"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
APP_ID = "__APP_ID__"
API_BASE = "https://api.proappstore.online"
# SESSION_SIGNING_KEY set as a secret binding at deploy time
# INTERNAL_TOKEN set as a secret binding at deploy time (trusts the platform
#   actions-executor; when unset the internal path is inert / fail-closed)

[[d1_databases]]
binding = "DB"
database_name = "pas-data-__APP_ID__"
database_id = "__DB_ID__"

# Auth calls to the platform API must use a service binding — same-zone
# subrequests bypass the route-mapped API worker (see deploy-worker.ts).
[[services]]
binding = "API"
service = "proappstore-api"
