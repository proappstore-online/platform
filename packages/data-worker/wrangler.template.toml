name = "pas-data-__APP_ID__"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
APP_ID = "__APP_ID__"
API_BASE = "https://api.proappstore.online"
# SESSION_SIGNING_KEY set as a secret binding at deploy time

[[d1_databases]]
binding = "DB"
database_name = "pas-data-__APP_ID__"
database_id = "__DB_ID__"
