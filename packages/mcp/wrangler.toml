name = "proappstore-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
API_BASE = "https://api.proappstore.online"
AGENTS_BASE = "https://agents.proappstore.online"
GITHUB_ORG = "proappstore-online"
AUTH_START = "https://api.proappstore.online/v1/auth/github/start"

# Secrets set via `wrangler secret put`:
#   SESSION_SIGNING_KEY
#   GITHUB_TOKEN (org-level PAT for repo operations)
#   INTERNAL_TOKEN (service-to-service auth for agents Worker)
#
# Optional read-only mode — set to "1" to block every mutating MCP tool and
# audit the denial. Leave unset for normal read/write operation.
#   MCP_READ_ONLY = "1"

[[routes]]
pattern = "mcp.proappstore.online/*"
zone_name = "proappstore.online"

# Sibling Workers MUST be called over service bindings: same-zone subrequests
# bypass route-mapped Workers (they go to the origin DNS record instead), so a
# plain fetch("https://api.proappstore.online/…") never reaches the API worker.
[[services]]
binding = "API"
service = "proappstore-api"

[[services]]
binding = "AGENTS"
service = "proappstore-agent-teams"

[[services]]
binding = "ADMIN"
service = "proappstore-admin"

[[services]]
binding = "HOST"
service = "proappstore-host"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "125418919bd640dcb3c45a7687b27162"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "PasMcpAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PasMcpAgent"]
